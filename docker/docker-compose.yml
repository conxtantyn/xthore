version: '3.8'
services:
  api:
    image: api:latest
    restart: unless-stopped
    platform: linux/amd64
    environment:
      - _JAVA_OPTIONS=-Xmx512m -Xms256m
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE},api-docs
      - MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED=true
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://admin:${JHIPSTER_REGISTRY_PASSWORD}@jhipster-registry:8761/eureka
      - SPRING_CLOUD_CONFIG_URI=http://admin:${JHIPSTER_REGISTRY_PASSWORD}@jhipster-registry:8761/config
      - JHIPSTER_REGISTRY_PASSWORD=${JHIPSTER_REGISTRY_PASSWORD}
      - POST_DELAY=15
    ports:
      - 8090:8090
    networks:
      - xthore

  catalog:
    image: catalog:latest
    restart: unless-stopped
    platform: linux/amd64
    environment:
      - _JAVA_OPTIONS=-Xmx512m -Xms256m
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://admin:${JHIPSTER_REGISTRY_PASSWORD}@jhipster-registry:8761/eureka
      - SPRING_CLOUD_CONFIG_URI=http://admin:${JHIPSTER_REGISTRY_PASSWORD}@jhipster-registry:8761/config
      - JHIPSTER_REGISTRY_PASSWORD=${JHIPSTER_REGISTRY_PASSWORD}
      - SPRING_DATASOURCE_URL=${XTHORE_DATASOURCE_CATALOG_LIQUIBASE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_LIQUIBASE_USER}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_LIQUIBASE_PASSWORD}
      - SPRING_R2DBC_URL=${XTHORE_DATASOURCE_CATALOG_URL}
      - SPRING_R2DBC_USERNAME=${SPRING_LIQUIBASE_USER}
      - SPRING_R2DBC_PASSWORD=${SPRING_LIQUIBASE_PASSWORD}
      - POST_DELAY=15
    networks:
      - xthore

  order:
    image: order:latest
    restart: unless-stopped
    platform: linux/amd64
    environment:
      - _JAVA_OPTIONS=-Xmx512m -Xms256m
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://admin:${JHIPSTER_REGISTRY_PASSWORD}@jhipster-registry:8761/eureka
      - SPRING_CLOUD_CONFIG_URI=http://admin:${JHIPSTER_REGISTRY_PASSWORD}@jhipster-registry:8761/config
      - JHIPSTER_REGISTRY_PASSWORD=${JHIPSTER_REGISTRY_PASSWORD}
      - SPRING_DATASOURCE_URL=${XTHORE_DATASOURCE_ORDER_LIQUIBASE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_LIQUIBASE_USER}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_LIQUIBASE_PASSWORD}
      - SPRING_R2DBC_URL=${XTHORE_DATASOURCE_ORDER_URL}
      - SPRING_R2DBC_USERNAME=${SPRING_LIQUIBASE_USER}
      - SPRING_R2DBC_PASSWORD=${SPRING_LIQUIBASE_PASSWORD}
      - POST_DELAY=15
    networks:
      - xthore

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${SPRING_LIQUIBASE_USER}
      - POSTGRES_PASSWORD=${SPRING_LIQUIBASE_PASSWORD}
    ports:
      - 5432:5432
    volumes:
      - ./postgres:/docker-entrypoint-initdb.d
      - ./postgres_data_user:/var/lib/postgresql/data
    networks:
      - xthore

  jhipster-registry:
    image: jhipster/jhipster-registry:v7.3.0
    platform: linux/amd64
    environment:
      - _JAVA_OPTIONS=-Xmx512m -Xms256m
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - XTHORE_JWT_BASE64_SECRET=${XTHORE_JWT_BASE64_SECRET}
      - SPRING_SECURITY_USER_PASSWORD=${JHIPSTER_REGISTRY_PASSWORD}
      - JHIPSTER_REGISTRY_PASSWORD=${JHIPSTER_REGISTRY_PASSWORD}
      - SPRING_CLOUD_CONFIG_SERVER_COMPOSITE_0_TYPE=native
      - SPRING_CLOUD_CONFIG_SERVER_COMPOSITE_0_SEARCH_LOCATIONS=file:./central-config
      - MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED=true
    volumes:
      - ./central-server-config:/central-config
    ports:
      - 8761:8761
    networks:
      - xthore

networks:
  xthore:
    driver: bridge
