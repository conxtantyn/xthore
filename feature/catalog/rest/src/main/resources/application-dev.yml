
eureka:
  instance:
    prefer-ip-address: false
  client:
    service-url:
      defaultZone: http://admin:${jhipster.registry.password}@localhost:8761/eureka/

spring:
  cloud:
    config:
      uri: http://admin:${jhipster.registry.password}@localhost:8761/config

server:
  port: 8081

management:
  metrics:
    tags:
      application: ${spring.application.name}
