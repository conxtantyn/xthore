
spring:
  cloud:
    config:
      fail-fast: true
      retry:
        initial-interval: 1000
        max-interval: 2000
        max-attempts: 100
      uri: http://admin:${jhipster.registry.password}@localhost:8761/config
      name: order
      profile: dev
      label: main

jhipster:
  registry:
    password: ${JHIPSTER_REGISTRY_PASSWORD}
